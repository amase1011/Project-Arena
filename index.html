<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Project Arena v0.6</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div><h1>PROJECT ARENA</h1><p>v0.6</p></div>
      <button id="restartBtn" class="ghost">最初から</button>
    </header>

    <section class="hud">
      <article class="hud-player npc"><span>NPC</span><strong id="npcLife">♥♥♥♥♥</strong><small>属性 <b id="npcAttr">？？？</b></small></article>
      <div class="round"><small>ROUND</small><strong id="roundNo">1</strong><span id="phase">ドラフト</span></div>
      <article class="hud-player you"><span>YOU</span><strong id="youLife">♥♥♥♥♥</strong><small>属性 <b id="youAttr">？？？</b></small></article>
    </section>

    <section class="game-panel">
      <div class="canvas-shell">
        <canvas id="battleCanvas" width="420" height="640"></canvas>
        <div id="centerBanner" class="center-banner hidden"></div>

        <section id="draftPanel" class="draft-modal">
          <div class="draft-card-shell">
            <div class="draft-head">
              <div><h2 id="draftTitle">カード選択 1/3</h2><p id="draftHelp">選ぶと戦場へ召喚されます</p></div>
              <div id="timerRing" class="timer-ring"><div class="timer-inner"><span id="timer">30</span></div></div>
            </div>
            <div id="cards" class="cards"></div>
            <button id="rerollBtn" class="reroll">↻ 引き直し</button>
          </div>
        </section>
      </div>

      <section id="resultPanel" class="result-panel hidden">
        <h2 id="resultText"></h2>
        <button id="nextRoundBtn" class="primary">次のラウンド</button>
      </section>
    </section>

    <section id="gameOverView" class="gameover hidden">
      <h2 id="gameOverText"></h2>
      <button id="againBtn" class="primary">もう一度</button>
    </section>

    <div id="revealOverlay" class="reveal-overlay hidden">
      <div id="revealCard" class="reveal-card">
        <div id="revealSeal" class="seal">?</div>
        <h2 id="revealTitle">カード開封</h2>
        <p id="revealResult"></p>
      </div>
    </div>
  </main>
  <script src="game.js"></script>
</body>
</html>
